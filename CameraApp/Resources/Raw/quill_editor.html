<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; }
        #editor {
            flex: 1;
            min-height: 0;
            font-size: 16px;
        }
        .ql-toolbar.ql-snow {
            border: none;
            border-bottom: 1px solid #dee2e6;
            background: #f8f9fa;
            padding: 8px;
        }
        .ql-container.ql-snow {
            border: none;
            flex: 1;
            overflow-y: auto;
            font-size: 16px;
        }
        .ql-editor {
            padding: 12px 16px;
            min-height: 200px;
        }
        .ql-editor.ql-blank::before {
            font-style: italic;
            color: #adb5bd;
        }
        .ql-snow .ql-toolbar button {
            width: 36px;
            height: 36px;
        }
        .ql-snow .ql-toolbar button svg {
            width: 20px;
            height: 20px;
        }
        .ql-snow .ql-toolbar .ql-color-picker .ql-picker-label {
            width: 36px;
            height: 36px;
            padding: 4px;
        }
        .ql-snow .ql-toolbar .ql-color-picker .ql-picker-label svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div id="editor"></div>

    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script>
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Digite o conteúdo aqui...',
            modules: {
                toolbar: {
                    container: [
                        ['bold', 'italic', 'underline'],
                        [{ 'align': [] }],
                        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                        [{ 'color': [] }],
                        ['image']
                    ],
                    handlers: {
                        image: function () {
                            window.location.href = 'app://pick-image';
                        }
                    }
                }
            }
        });

        function setContent(html) {
            quill.root.innerHTML = html || '';
        }

        function getContent() {
            return quill.root.innerHTML;
        }

        function insertImage(dataUrl) {
            var range = quill.getSelection(true);
            var index = range ? range.index : quill.getLength();
            quill.insertEmbed(index, 'image', dataUrl, Quill.sources.USER);
            quill.setSelection(index + 1, Quill.sources.SILENT);
        }

        function clearContent() {
            quill.root.innerHTML = '';
        }

        function isEmpty() {
            var text = quill.getText().trim();
            var html = quill.root.innerHTML;
            return text.length === 0 && !html.includes('<img');
        }
    </script>
</body>
</html>
